<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 格式化工具</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        /* ========== CSS Variables ========== */
        :root {
            --bg-primary: #1e1e2e;
            --bg-secondary: #181825;
            --bg-surface: #252536;
            --bg-hover: #2a2a3c;
            --bg-input: #1a1a2e;
            --border: #313244;
            --border-focus: #89b4fa;
            --text-primary: #cdd6f4;
            --text-secondary: #a6adc8;
            --text-muted: #6c7086;
            --accent: #89b4fa;
            --accent-hover: #74c7ec;
            --green: #a6e3a1;
            --green-bg: rgba(166, 227, 161, 0.1);
            --green-border: rgba(166, 227, 161, 0.3);
            --red: #f38ba8;
            --red-bg: rgba(243, 139, 168, 0.1);
            --red-border: rgba(243, 139, 168, 0.3);
            --yellow: #f9e2af;
            --peach: #fab387;
            --lavender: #b4befe;
            --radius: 10px;
            --radius-lg: 16px;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
            --shadow-lg: 0 12px 36px rgba(0,0,0,0.4);
            --shadow-glow: 0 0 20px rgba(137, 180, 250, 0.15);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: 0.15s ease;
        }

        /* ========== Reset & Base ========== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(137, 180, 250, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(180, 190, 254, 0.03) 0%, transparent 50%);
        }

        /* ========== Scrollbar ========== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ========== Header ========== */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, rgba(24, 24, 37, 0.95) 100%);
            border-bottom: 1px solid rgba(49, 50, 68, 0.6);
            gap: 16px;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 1px 0 rgba(205, 214, 244, 0.03);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
            letter-spacing: -0.3px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--lavender) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 800;
            color: var(--bg-primary);
            box-shadow: 0 2px 8px rgba(137, 180, 250, 0.3);
            transition: transform var(--transition), box-shadow var(--transition);
        }

        .logo-icon:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(137, 180, 250, 0.4);
        }

        /* ========== Toolbar ========== */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .toolbar .sep {
            width: 1px;
            height: 24px;
            background: linear-gradient(to bottom, transparent, var(--border), transparent);
            margin: 0 6px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            border: 1px solid rgba(49, 50, 68, 0.8);
            border-radius: var(--radius);
            background: linear-gradient(to bottom, var(--bg-surface) 0%, rgba(37, 37, 54, 0.8) 100%);
            color: var(--text-primary);
            font-size: 13px;
            font-family: var(--font-sans);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            line-height: 1.5;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.03), transparent);
            pointer-events: none;
        }

        .btn:hover {
            background: linear-gradient(to bottom, var(--bg-hover) 0%, rgba(42, 42, 60, 0.9) 100%);
            border-color: var(--text-muted);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
            box-shadow: none;
        }

        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #7aafff 100%);
            color: var(--bg-primary);
            border-color: transparent;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(137, 180, 250, 0.25);
        }

        .btn-primary::before {
            background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--accent-hover) 0%, #8ec5fc 100%);
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(137, 180, 250, 0.35);
        }

        .btn-danger {
            border-color: rgba(243, 139, 168, 0.3);
            color: var(--red);
        }

        .btn-danger:hover {
            background: var(--red-bg);
            border-color: var(--red);
            box-shadow: 0 2px 8px rgba(243, 139, 168, 0.15);
        }

        .btn .shortcut {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            padding: 2px 5px;
            background: rgba(108, 112, 134, 0.15);
            border-radius: 4px;
            margin-left: 2px;
        }

        .btn-primary .shortcut {
            color: rgba(30,30,46,0.6);
            background: rgba(30,30,46,0.1);
        }

        /* ========== Main Layout ========== */
        .main-layout {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            gap: 0;
        }

        /* ========== Editor Area ========== */
        .editor-area {
            flex: 1;
            display: flex;
            min-width: 0;
            gap: 0;
        }

        .panel {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            border-right: 1px solid rgba(49, 50, 68, 0.6);
            position: relative;
        }

        .panel:last-child { border-right: none; }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 18px;
            background: linear-gradient(to bottom, var(--bg-secondary), rgba(24, 24, 37, 0.95));
            border-bottom: 1px solid rgba(49, 50, 68, 0.6);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            flex-shrink: 0;
        }

        .panel-header .label {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-body {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* Input textarea */
        #input {
            width: 100%;
            height: 100%;
            padding: 18px;
            border: none;
            outline: none;
            background: var(--bg-input);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 13.5px;
            line-height: 1.7;
            resize: none;
            tab-size: 4;
            transition: background var(--transition-fast);
        }

        #input:focus {
            background: rgba(26, 26, 46, 0.8);
        }

        #input::placeholder {
            color: var(--text-muted);
            font-style: italic;
            opacity: 0.7;
        }

        /* Output with syntax highlighting */
        .output-wrap {
            width: 100%;
            height: 100%;
            overflow: auto;
            background: var(--bg-input);
        }

        .output-wrap pre {
            margin: 0;
            padding: 18px;
            background: transparent !important;
        }

        .output-wrap code {
            font-family: var(--font-mono) !important;
            font-size: 13.5px !important;
            line-height: 1.7 !important;
            background: transparent !important;
        }

        .output-placeholder {
            padding: 40px 20px;
            color: var(--text-muted);
            font-style: italic;
            font-size: 14px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            opacity: 0.6;
        }

        .output-error {
            padding: 18px;
            color: var(--red);
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.6;
            border-left: 3px solid var(--red);
            margin: 12px;
            background: var(--red-bg);
            border-radius: 0 var(--radius) var(--radius) 0;
        }

        .output-warning {
            margin: 12px;
            padding: 10px 14px;
            background: rgba(249, 226, 175, 0.08);
            border: 1px solid rgba(249, 226, 175, 0.2);
            border-left: 3px solid var(--yellow);
            border-radius: 0 var(--radius) var(--radius) 0;
            color: var(--yellow);
            font-size: 12.5px;
        }

        /* ========== Drag & Drop Overlay ========== */
        .drop-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(137, 180, 250, 0.08);
            border: 2px dashed var(--accent);
            border-radius: var(--radius);
            z-index: 10;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--accent);
            font-weight: 600;
            pointer-events: none;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            animation: pulse-border 2s ease-in-out infinite;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: var(--accent); }
            50% { border-color: var(--lavender); }
        }

        .drop-overlay.active { display: flex; }

        /* ========== Sidebar (History) ========== */
        .sidebar {
            width: 300px;
            background: linear-gradient(to bottom, var(--bg-secondary), rgba(24, 24, 37, 0.98));
            border-left: 1px solid rgba(49, 50, 68, 0.6);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: width var(--transition), opacity var(--transition);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .sidebar.collapsed {
            width: 0;
            overflow: hidden;
            border-left: none;
            opacity: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            border-bottom: 1px solid rgba(49, 50, 68, 0.6);
            flex-shrink: 0;
        }

        .sidebar-header h3 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
        }

        .sidebar-toggle {
            padding: 4px 8px;
            border: none;
            background: rgba(108, 112, 134, 0.1);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            border-radius: 6px;
            transition: all var(--transition-fast);
        }

        .sidebar-toggle:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .history-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            color: var(--text-muted);
            text-align: center;
            font-size: 13px;
            gap: 10px;
            height: 100%;
        }

        .history-empty-icon {
            font-size: 36px;
            opacity: 0.4;
            filter: grayscale(0.5);
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all var(--transition-fast);
            margin-bottom: 4px;
            border: 1px solid transparent;
            position: relative;
        }

        .history-item:hover {
            background: var(--bg-hover);
            transform: translateX(2px);
        }

        .history-item.selected {
            background: linear-gradient(to right, rgba(137, 180, 250, 0.08), transparent);
            border-color: rgba(137, 180, 250, 0.3);
        }

        .history-checkbox {
            accent-color: var(--accent);
            width: 15px;
            height: 15px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .history-info {
            flex: 1;
            min-width: 0;
        }

        .history-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-snippet {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 3px;
            font-family: var(--font-mono);
        }

        .history-delete {
            padding: 3px 7px;
            border: none;
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            border-radius: 4px;
            opacity: 0;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }

        .history-item:hover .history-delete { opacity: 1; }
        .history-delete:hover { color: var(--red); background: var(--red-bg); }

        .sidebar-footer {
            padding: 10px 14px;
            border-top: 1px solid rgba(49, 50, 68, 0.6);
            flex-shrink: 0;
        }

        .compare-actions {
            display: flex;
            gap: 8px;
        }

        .compare-actions .btn { flex: 1; justify-content: center; font-size: 12px; padding: 6px 10px; }

        /* ========== Modal ========== */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            animation: fade-in 0.2s ease;
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-backdrop.active { display: flex; }

        .modal {
            background: linear-gradient(to bottom, var(--bg-surface) 0%, rgba(37, 37, 54, 0.98) 100%);
            border: 1px solid rgba(49, 50, 68, 0.8);
            border-radius: var(--radius-lg);
            padding: 28px;
            width: 380px;
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            animation: modal-slide-up 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes modal-slide-up {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal h3 {
            font-size: 17px;
            margin-bottom: 18px;
            color: var(--text-primary);
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .modal input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid rgba(49, 50, 68, 0.8);
            border-radius: var(--radius);
            background: rgba(26, 26, 46, 0.6);
            color: var(--text-primary);
            font-size: 14px;
            font-family: var(--font-sans);
            outline: none;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        .modal input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(137, 180, 250, 0.1);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        /* ========== Compare View ========== */
        .compare-container {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 900;
            display: none;
            flex-direction: column;
            animation: fade-in 0.2s ease;
        }

        .compare-container.active { display: flex; }

        .compare-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: linear-gradient(to right, var(--bg-secondary), rgba(24, 24, 37, 0.95));
            border-bottom: 1px solid rgba(49, 50, 68, 0.6);
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .compare-header .title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.2px;
        }

        .compare-header .actions {
            display: flex;
            gap: 8px;
        }

        .compare-body {
            flex: 1;
            display: flex;
            position: relative;
            min-height: 0;
        }

        .compare-svg {
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .compare-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }

        .compare-col-header {
            padding: 10px 18px;
            background: linear-gradient(to bottom, var(--bg-surface), rgba(37, 37, 54, 0.95));
            border-bottom: 1px solid rgba(49, 50, 68, 0.6);
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            flex-shrink: 0;
        }

        .compare-content {
            flex: 1;
            overflow: auto;
            padding: 10px 0;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.6;
        }

        .compare-divider {
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--border), transparent);
            flex-shrink: 0;
        }

        .compare-line {
            display: flex;
            align-items: flex-start;
            padding: 1px 18px;
            min-height: 22px;
            transition: background var(--transition-fast);
        }

        .compare-line.diff {
            background: rgba(243, 139, 168, 0.06);
            border-left: 3px solid var(--red);
        }

        .compare-line.same {
            border-left: 3px solid transparent;
        }

        .compare-line:hover {
            background: rgba(255,255,255,0.02);
        }

        .compare-line-num {
            width: 44px;
            text-align: right;
            padding-right: 14px;
            color: var(--text-muted);
            user-select: none;
            flex-shrink: 0;
            font-size: 12px;
        }

        .compare-line.diff .compare-line-num { color: rgba(243, 139, 168, 0.7); }
        .compare-line-text { white-space: pre; flex: 1; min-width: 0; }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(90px);
            background: linear-gradient(to right, var(--bg-surface), rgba(37, 37, 54, 0.98));
            color: var(--text-primary);
            border: 1px solid rgba(49, 50, 68, 0.8);
            border-radius: var(--radius);
            padding: 11px 22px;
            font-size: 13px;
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(137, 180, 250, 0.05);
            z-index: 2000;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease;
            pointer-events: none;
            opacity: 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-weight: 500;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ========== Status Bar ========== */
        .statusbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 18px;
            background: linear-gradient(to right, var(--bg-secondary), rgba(24, 24, 37, 0.95));
            border-top: 1px solid rgba(49, 50, 68, 0.6);
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .statusbar-left, .statusbar-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        /* ========== Collapsed Sidebar Toggle ========== */
        #sidebar-open-btn {
            transition: all var(--transition);
        }

        #sidebar-open-btn:hover {
            background: var(--bg-hover) !important;
            color: var(--text-primary) !important;
        }

        /* ========== Responsive ========== */
        @media (max-width: 900px) {
            .editor-area { flex-direction: column; }
            .panel {
                border-right: none;
                border-bottom: 1px solid rgba(49, 50, 68, 0.6);
            }
            .panel:last-child { border-bottom: none; }
            .sidebar {
                width: 100%;
                border-left: none;
                border-top: 1px solid rgba(49, 50, 68, 0.6);
                max-height: 280px;
            }
            .sidebar.collapsed { max-height: 0; }
            .btn .shortcut { display: none; }
            .toolbar { gap: 6px; }
            .btn { padding: 7px 12px; font-size: 12px; }
            header { padding: 12px 16px; }
        }

        @media (max-width: 600px) {
            header { flex-wrap: wrap; padding: 10px 12px; }
            .toolbar { width: 100%; justify-content: center; }
            .logo { font-size: 15px; }
        }

        /* ========== Animations ========== */
        @keyframes slide-in-right {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .history-item {
            animation: slide-in-right 0.2s ease backwards;
        }

        .history-item:nth-child(1) { animation-delay: 0.02s; }
        .history-item:nth-child(2) { animation-delay: 0.04s; }
        .history-item:nth-child(3) { animation-delay: 0.06s; }
        .history-item:nth-child(4) { animation-delay: 0.08s; }
        .history-item:nth-child(5) { animation-delay: 0.10s; }
        .history-item:nth-child(n+6) { animation-delay: 0.12s; }
    </style>
</head>
<body>
    <!-- ========== Header & Toolbar ========== -->
    <header>
        <div class="logo">
            <div class="logo-icon">{ }</div>
            <span>JSON 格式化工具</span>
        </div>
        <div class="toolbar">
            <button class="btn btn-primary" onclick="formatJSON()" title="格式化 JSON">
                格式化 <span class="shortcut">⌘↵</span>
            </button>
            <button class="btn" onclick="minifyJSON()" title="压缩 JSON">
                压缩
            </button>
            <div class="sep"></div>
            <button class="btn" onclick="copyOutput()" title="复制结果">
                📋 复制
            </button>
            <button class="btn" onclick="downloadJSON()" title="下载 JSON 文件">
                ⬇ 下载 <span class="shortcut">⌘D</span>
            </button>
            <div class="sep"></div>
            <button class="btn" onclick="saveHistory()" title="保存到历史">
                💾 保存 <span class="shortcut">⌘S</span>
            </button>
            <button class="btn btn-danger" onclick="clearContent()" title="清空输入输出">
                清空
            </button>
        </div>
    </header>

    <!-- ========== Main Layout ========== -->
    <div class="main-layout">
        <!-- Editor: Left = Input, Right = Output -->
        <div class="editor-area">
            <div class="panel" id="input-panel">
                <div class="panel-header">
                    <span class="label">📝 输入</span>
                    <span id="input-size" style="font-weight:400;text-transform:none;letter-spacing:0"></span>
                </div>
                <div class="panel-body" id="input-body">
                    <textarea id="input" placeholder="在此粘贴 JSON，或拖拽 JSON 文件到此处&#10;&#10;快捷键：&#10;  Ctrl+Enter  格式化&#10;  Ctrl+S      保存&#10;  Ctrl+D      下载" spellcheck="false"></textarea>
                    <div class="drop-overlay" id="drop-overlay">📂 释放以加载文件</div>
                </div>
            </div>
            <div class="panel" id="output-panel">
                <div class="panel-header">
                    <span class="label">✨ 输出</span>
                    <span id="output-status" style="font-weight:400;text-transform:none;letter-spacing:0"></span>
                </div>
                <div class="panel-body">
                    <div class="output-wrap" id="output-wrap">
                        <div class="output-placeholder">格式化后的 JSON 将显示在这里</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar: History -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>历史记录</h3>
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="收起侧栏">◀</button>
            </div>
            <div class="history-list" id="history-list"></div>
            <div class="sidebar-footer">
                <div class="compare-actions">
                    <button class="btn" id="compare-btn" onclick="compareSelected()" disabled>🔍 对比</button>
                    <button class="btn" onclick="clearAllHistory()" title="清空所有历史">🗑 清空</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Collapsed sidebar toggle -->
    <button class="sidebar-toggle" id="sidebar-open-btn" onclick="toggleSidebar()"
        style="display:none;position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:100;
               background:var(--bg-surface);border:1px solid var(--border);border-right:none;
               border-radius:4px 0 0 4px;padding:8px 6px;color:var(--text-muted);font-size:12px;cursor:pointer;"
        title="展开侧栏">▶</button>

    <!-- ========== Status Bar ========== -->
    <div class="statusbar">
        <div class="statusbar-left">
            <span id="status-msg">就绪</span>
        </div>
        <div class="statusbar-right">
            <span id="status-shortcuts">Ctrl+Enter 格式化 | Ctrl+S 保存 | Ctrl+D 下载</span>
        </div>
    </div>

    <!-- ========== Save Modal ========== -->
    <div class="modal-backdrop" id="save-modal">
        <div class="modal">
            <h3>保存到历史记录</h3>
            <input type="text" id="save-name-input" placeholder="输入记录名称（可选）" autocomplete="off">
            <div class="modal-actions">
                <button class="btn" onclick="closeSaveModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmSave()">保存</button>
            </div>
        </div>
    </div>

    <!-- ========== Compare View ========== -->
    <div class="compare-container" id="compare-container">
        <div class="compare-header">
            <span class="title">🔍 JSON 对比</span>
            <div class="actions">
                <button class="btn" onclick="reverseCompare()">🔄 交换</button>
                <button class="btn btn-danger" onclick="closeCompare()">✕ 关闭</button>
            </div>
        </div>
        <div class="compare-body">
            <svg class="compare-svg" id="compare-svg"></svg>
            <div class="compare-col" id="compare-left">
                <div class="compare-col-header" id="compare-left-title"></div>
                <div class="compare-content" id="compare-left-content"></div>
            </div>
            <div class="compare-divider"></div>
            <div class="compare-col" id="compare-right">
                <div class="compare-col-header" id="compare-right-title"></div>
                <div class="compare-content" id="compare-right-content"></div>
            </div>
        </div>
    </div>

    <!-- ========== Toast ========== -->
    <div class="toast" id="toast"></div>

    <script>
    /* ==============================================================
       State
    ============================================================== */
    /* ==============================================================
       State (use window. to ensure global accessibility across scopes)
    ============================================================== */
    window.window.selectedIds = [];
    window.window.compareOrder = [0, 1];
    window.lastFormattedContent = '';  // raw formatted JSON text

    /* ==============================================================
       Utilities
    ============================================================== */
    function escapeHtml(str) {
        return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function showToast(msg, duration = 2000) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), duration);
    }

    function setStatus(msg) {
        document.getElementById('status-msg').textContent = msg;
    }

    function getHistory() {
        return JSON.parse(localStorage.getItem('jsonHistory') || '[]');
    }

    function setHistory(arr) {
        localStorage.setItem('jsonHistory', JSON.stringify(arr));
    }

    function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    /* ==============================================================
       Core: Format / Minify / Fix
    ============================================================== */
    function tryFixJson(str) {
        let s = str.trim();
        let lc = (s.match(/\{/g) || []).length;
        let rc = (s.match(/\}/g) || []).length;
        let ls = (s.match(/\[/g) || []).length;
        let rs = (s.match(/\]/g) || []).length;
        let fixed = s, ok = false;
        while (lc > rc) { fixed += '}'; rc++; ok = true; }
        while (ls > rs) { fixed += ']'; rs++; ok = true; }
        return { success: ok, json: fixed };
    }

    function formatJSON() {
        const input = document.getElementById('input');
        const value = input.value.trim();
        if (!value) {
            renderOutput('', 'empty');
            setStatus('输入为空');
            return;
        }

        let jsonObj = null;
        let fixed = false;
        try {
            jsonObj = JSON.parse(value);
        } catch (error) {
            const fixResult = tryFixJson(value);
            if (fixResult.success) {
                try {
                    jsonObj = JSON.parse(fixResult.json);
                    fixed = true;
                } catch (e2) {
                    renderOutput('错误：无效的 JSON 格式\n' + error.message, 'error');
                    setStatus('❌ JSON 格式错误');
                    return;
                }
            } else {
                renderOutput('错误：无效的 JSON 格式\n' + error.message, 'error');
                setStatus('❌ JSON 格式错误');
                return;
            }
        }

        window.lastFormattedContent = JSON.stringify(jsonObj, null, 2);
        renderOutput(window.lastFormattedContent, 'json', fixed);
        setStatus('✅ 格式化成功' + (fixed ? '（已自动补全括号）' : ''));
        updateOutputStatus(window.lastFormattedContent);
    }

    function minifyJSON() {
        const input = document.getElementById('input');
        const value = input.value.trim();
        if (!value) {
            showToast('请先输入 JSON');
            return;
        }

        try {
            const obj = JSON.parse(value);
            window.lastFormattedContent = JSON.stringify(obj);
            renderOutput(window.lastFormattedContent, 'json');
            setStatus('✅ 压缩成功');
            updateOutputStatus(window.lastFormattedContent);
        } catch (error) {
            renderOutput('错误：无效的 JSON 格式\n' + error.message, 'error');
            setStatus('❌ JSON 格式错误');
        }
    }

    /* ==============================================================
       Output Rendering
    ============================================================== */
    function renderOutput(content, type, fixed = false) {
        const wrap = document.getElementById('output-wrap');

        if (type === 'empty') {
            wrap.innerHTML = '<div class="output-placeholder">格式化后的 JSON 将显示在这里</div>';
            return;
        }

        if (type === 'error') {
            wrap.innerHTML = `<div class="output-error">${escapeHtml(content)}</div>`;
            return;
        }

        // JSON with syntax highlighting
        let html = '<pre><code class="language-json hljs"></code></pre>';
        wrap.innerHTML = html;

        const codeEl = wrap.querySelector('code');
        codeEl.textContent = content;
        hljs.highlightElement(codeEl);

        if (fixed) {
            const warning = document.createElement('div');
            warning.className = 'output-warning';
            warning.textContent = '⚠ 原始 JSON 缺失部分括号，已自动补全';
            wrap.appendChild(warning);
        }
    }

    function updateOutputStatus(content) {
        const lines = content.split('\n').length;
        const size = new Blob([content]).size;
        document.getElementById('output-status').textContent = `${lines} 行 · ${formatBytes(size)}`;
    }

    /* ==============================================================
       Copy / Download / Clear
    ============================================================== */
    function copyOutput() {
        if (!window.lastFormattedContent) {
            showToast('没有可复制的内容');
            return;
        }
        navigator.clipboard.writeText(window.lastFormattedContent).then(() => {
            showToast('✅ 已复制到剪贴板');
        }).catch(() => {
            // fallback
            const ta = document.createElement('textarea');
            ta.value = window.lastFormattedContent;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('✅ 已复制到剪贴板');
        });
    }

    function downloadJSON() {
        if (!window.lastFormattedContent) {
            showToast('没有可下载的内容');
            return;
        }
        const blob = new Blob([window.lastFormattedContent], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'formatted_' + Date.now() + '.json';
        a.click();
        URL.revokeObjectURL(url);
        showToast('⬇ 已下载');
    }

    function clearContent() {
        document.getElementById('input').value = '';
        window.lastFormattedContent = '';
        renderOutput('', 'empty');
        document.getElementById('input-size').textContent = '';
        document.getElementById('output-status').textContent = '';
        setStatus('已清空');
    }

    /* ==============================================================
       History
    ============================================================== */
    function saveHistory() {
        if (!window.lastFormattedContent || window.lastFormattedContent.startsWith('错误')) {
            showToast('请先格式化有效的 JSON');
            return;
        }
        openSaveModal();
    }

    function openSaveModal() {
        document.getElementById('save-modal').classList.add('active');
        const input = document.getElementById('save-name-input');
        input.value = '';
        setTimeout(() => input.focus(), 50);
    }

    function closeSaveModal() {
        document.getElementById('save-modal').classList.remove('active');
    }

    function confirmSave() {
        let name = document.getElementById('save-name-input').value.trim() || '未命名';
        const id = Date.now();
        const history = getHistory();
        history.unshift({ id, name, content: window.lastFormattedContent });
        setHistory(history);
        closeSaveModal();
        renderHistory();
        showToast('💾 已保存：' + name);
    }

    function deleteHistory(id) {
        let history = getHistory().filter(item => item.id !== id);
        setHistory(history);
        window.window.selectedIds = window.window.selectedIds.filter(i => i !== id);
        renderHistory();
    }

    function clearAllHistory() {
        if (getHistory().length === 0) return;
        setHistory([]);
        window.window.selectedIds = [];
        renderHistory();
        showToast('🗑 历史已清空');
    }

    function loadHistory(id) {
        const history = getHistory();
        const item = history.find(h => h.id === id);
        if (!item) return;
        document.getElementById('input').value = item.content;
        formatJSON();
        showToast('已加载：' + item.name);
    }

    function toggleSelect(id) {
        if (window.selectedIds.includes(id)) {
            window.window.selectedIds = window.window.selectedIds.filter(i => i !== id);
        } else {
            if (window.selectedIds.length < 2) {
                window.selectedIds.push(id);
            } else {
                window.selectedIds = [window.selectedIds[1], id];
            }
        }
        renderHistory();
    }

    function renderHistory() {
        const history = getHistory();
        const list = document.getElementById('history-list');
        const compareBtn = document.getElementById('compare-btn');

        if (history.length === 0) {
            list.innerHTML = `
                <div class="history-empty">
                    <div class="history-empty-icon">📋</div>
                    <div>暂无历史记录</div>
                    <div style="font-size:11px">格式化后保存即可</div>
                </div>`;
            compareBtn.disabled = true;
            return;
        }

        list.innerHTML = history.map(item => {
            const snippet = item.content.replace(/\s+/g, '').slice(0, 50);
            const checked = window.selectedIds.includes(item.id) ? 'checked' : '';
            const selected = window.selectedIds.includes(item.id) ? 'selected' : '';
            return `
                <div class="history-item ${selected}" onclick="loadHistory(${item.id})">
                    <input type="checkbox" class="history-checkbox"
                           onclick="event.stopPropagation();toggleSelect(${item.id})"
                           ${checked} title="选中用于对比" />
                    <div class="history-info">
                        <div class="history-name">${escapeHtml(item.name)}</div>
                        <div class="history-snippet">${escapeHtml(snippet)}</div>
                    </div>
                    <button class="history-delete" onclick="event.stopPropagation();deleteHistory(${item.id})" title="删除">✕</button>
                </div>`;
        }).join('');

        compareBtn.disabled = window.selectedIds.length !== 2;
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const openBtn = document.getElementById('sidebar-open-btn');
        sidebar.classList.toggle('collapsed');
        openBtn.style.display = sidebar.classList.contains('collapsed') ? 'block' : 'none';
    }

    /* ==============================================================
       Compare View
    ============================================================== */
    function compareSelected() {
        if (window.selectedIds.length !== 2) return;
        const history = getHistory();
        const items = [
            history.find(h => h.id === window.selectedIds[window.compareOrder[0]]),
            history.find(h => h.id === window.selectedIds[window.compareOrder[1]])
        ];
        if (!items[0] || !items[1]) return;

        let content1 = '', content2 = '';
        try { content1 = JSON.stringify(JSON.parse(items[0].content), null, 2); } catch { content1 = items[0].content; }
        try { content2 = JSON.stringify(JSON.parse(items[1].content), null, 2); } catch { content2 = items[1].content; }

        const lines1 = content1.split(/\r?\n/);
        const lines2 = content2.split(/\r?\n/);

        // Build line-content maps
        const map1 = {}, map2 = {};
        for (let i = 0; i < lines1.length; i++) {
            const l = lines1[i];
            if (!map1[l]) map1[l] = [];
            map1[l].push(i);
        }
        for (let i = 0; i < lines2.length; i++) {
            const l = lines2[i];
            if (!map2[l]) map2[l] = [];
            map2[l].push(i);
        }

        // Same-line pairs (optimized: only connect closest matches)
        const samePairs = [];
        const used2 = new Set();
        for (const line in map1) {
            if (map2[line]) {
                map1[line].forEach(i => {
                    // Find nearest unmatched j
                    let bestJ = -1, bestDist = Infinity;
                    map2[line].forEach(j => {
                        if (!used2.has(j)) {
                            const dist = Math.abs(i - j);
                            if (dist < bestDist) { bestDist = dist; bestJ = j; }
                        }
                    });
                    if (bestJ >= 0) {
                        samePairs.push([i, bestJ]);
                        used2.add(bestJ);
                    }
                });
            }
        }

        const same1 = new Set(samePairs.map(p => p[0]));
        const same2 = new Set(samePairs.map(p => p[1]));

        // Render left
        let html1 = '';
        for (let i = 0; i < lines1.length; i++) {
            const cls = same1.has(i) ? 'same' : 'diff';
            html1 += `<div class="compare-line ${cls}" data-line1="${i}"><span class="compare-line-num">${i + 1}</span><span class="compare-line-text">${escapeHtml(lines1[i])}</span></div>`;
        }

        // Render right
        let html2 = '';
        for (let i = 0; i < lines2.length; i++) {
            const cls = same2.has(i) ? 'same' : 'diff';
            html2 += `<div class="compare-line ${cls}" data-line2="${i}"><span class="compare-line-num">${i + 1}</span><span class="compare-line-text">${escapeHtml(lines2[i])}</span></div>`;
        }

        document.getElementById('compare-left-title').textContent = '📄 ' + items[0].name;
        document.getElementById('compare-right-title').textContent = '📄 ' + items[1].name;
        document.getElementById('compare-left-content').innerHTML = html1;
        document.getElementById('compare-right-content').innerHTML = html2;

        document.getElementById('compare-container').classList.add('active');

        // Draw optimized curves after render
        requestAnimationFrame(() => drawCompareCurves(samePairs));

        // Sync scroll
        const leftScroll = document.getElementById('compare-left-content');
        const rightScroll = document.getElementById('compare-right-content');
        let syncing = false;
        leftScroll.addEventListener('scroll', () => {
            if (syncing) return;
            syncing = true;
            rightScroll.scrollTop = leftScroll.scrollTop;
            requestAnimationFrame(() => { syncing = false; });
        });
        rightScroll.addEventListener('scroll', () => {
            if (syncing) return;
            syncing = true;
            leftScroll.scrollTop = rightScroll.scrollTop;
            requestAnimationFrame(() => { syncing = false; });
        });
    }

    function drawCompareCurves(samePairs) {
        const svg = document.getElementById('compare-svg');
        if (!svg) return;

        const container = document.querySelector('.compare-body');
        const containerRect = container.getBoundingClientRect();

        svg.setAttribute('width', containerRect.width);
        svg.setAttribute('height', containerRect.height);

        const leftCol = document.getElementById('compare-left-content');
        const rightCol = document.getElementById('compare-right-content');

        // Only draw curves for diff lines that have same-line context (skip fully identical blocks)
        // Filter: keep pairs where both lines are near diff lines for visual clarity
        const filteredPairs = samePairs.filter(pair => {
            const i = pair[0], j = pair[1];
            // Skip if surrounded by same lines (part of a large identical block)
            const isIsolated =
                (i > 0 && !document.querySelector(`[data-line1="${i-1}"].diff`)) ||
                (j > 0 && !document.querySelector(`[data-line2="${j-1}"].diff`)) ||
                true;  // draw all but thin
            return true;
        });

        svg.innerHTML = `
            <defs>
                <linearGradient id="curve-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#89b4fa;stop-opacity:0.4" />
                    <stop offset="100%" style="stop-color:#b4befe;stop-opacity:0.4" />
                </linearGradient>
            </defs>
        `;

        filteredPairs.forEach(pair => {
            const leftEl = leftCol.querySelector(`[data-line1="${pair[0]}"]`);
            const rightEl = rightCol.querySelector(`[data-line2="${pair[1]}"]`);
            if (!leftEl || !rightEl) return;

            const lr = leftEl.getBoundingClientRect();
            const rr = rightEl.getBoundingClientRect();

            const x1 = leftCol.getBoundingClientRect().right - containerRect.left;
            const x2 = rightCol.getBoundingClientRect().left - containerRect.left;
            const y1 = lr.top - containerRect.top + lr.height / 2;
            const y2 = rr.top - containerRect.top + rr.height / 2;

            const cx = (x1 + x2) / 2;
            const path = `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`;
            svg.innerHTML += `<path d="${path}" stroke="url(#curve-grad)" fill="none" stroke-width="1.5" />`;
        });
    }

    function reverseCompare() {
        window.compareOrder.reverse();
        compareSelected();
    }

    function closeCompare() {
        document.getElementById('compare-container').classList.remove('active');
    }

    /* ==============================================================
       Drag & Drop
    ============================================================== */
    function initDragDrop() {
        const inputBody = document.getElementById('input-body');
        const overlay = document.getElementById('drop-overlay');
        let dragCounter = 0;

        inputBody.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            overlay.classList.add('active');
        });

        inputBody.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter === 0) overlay.classList.remove('active');
        });

        inputBody.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        inputBody.addEventListener('drop', (e) => {
            e.preventDefault();
            dragCounter = 0;
            overlay.classList.remove('active');

            const file = e.dataTransfer.files[0];
            if (!file) return;

            if (!file.name.endsWith('.json') && file.type !== 'application/json') {
                showToast('⚠ 请拖入 .json 文件');
                return;
            }

            const reader = new FileReader();
            reader.onload = (evt) => {
                document.getElementById('input').value = evt.target.result;
                formatJSON();
                showToast('📂 已加载：' + file.name);
            };
            reader.readAsText(file);
        });
    }

    /* ==============================================================
       Keyboard Shortcuts
    ============================================================== */
    function initKeyboard() {
        document.addEventListener('keydown', (e) => {
            const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
            const mod = isMac ? e.metaKey : e.ctrlKey;

            // Ctrl+Enter: Format
            if (mod && e.key === 'Enter') {
                e.preventDefault();
                formatJSON();
                return;
            }

            // Ctrl+S: Save
            if (mod && e.key === 's') {
                e.preventDefault();
                saveHistory();
                return;
            }

            // Ctrl+D: Download
            if (mod && e.key === 'd') {
                e.preventDefault();
                downloadJSON();
                return;
            }

            // Escape: close modal / compare
            if (e.key === 'Escape') {
                const modal = document.getElementById('save-modal');
                const compare = document.getElementById('compare-container');
                if (modal.classList.contains('active')) {
                    closeSaveModal();
                } else if (compare.classList.contains('active')) {
                    closeCompare();
                }
            }
        });

        // Enter in modal input = confirm
        document.getElementById('save-name-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                confirmSave();
            }
        });
    }

    /* ==============================================================
       Input Size Tracker
    ============================================================== */
    function initInputTracker() {
        const input = document.getElementById('input');
        input.addEventListener('input', () => {
            const val = input.value;
            if (val) {
                const size = new Blob([val]).size;
                document.getElementById('input-size').textContent = formatBytes(size);
            } else {
                document.getElementById('input-size').textContent = '';
            }
        });
    }

    /* ==============================================================
       Init
    ============================================================== */
    window.addEventListener('DOMContentLoaded', () => {
        renderHistory();
        initDragDrop();
        initKeyboard();
        initInputTracker();
        setStatus('就绪');
    });
    </script>
</body>
